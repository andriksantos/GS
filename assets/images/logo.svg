<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="Grupo Saneri">
  <title>Grupo Saneri S. de R.L.</title>
  <!-- Triangle symbol / Icon -->
  <g transform="translate(0, 4)">
    <!-- Large triangle (dark navy) -->
    <polygon points="36,0 60,40 12,40" fill="#2B4A6F"/>
    <!-- Small diamond/square accent (slate gray) -->
    <polygon points="26,16 36,6 46,16 36,26" fill="#6B8CAE"/>
    <!-- Small bottom accent -->
    <rect x="16" y="42" width="44" height="6" rx="1" fill="#2B4A6F" opacity="0.3"/>
  </g>
  <!-- GRUPO text (small, uppercase, spaced) -->
  <text x="70" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="4" fill="#6B8CAE" text-anchor="start">GRUPO</text>
  <!-- SANERI text (large, bold) -->
  <text x="68" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="2" fill="#2B4A6F" text-anchor="start">SANERI</text>
</svg>
